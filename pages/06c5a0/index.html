Cite: van Dijk D, Sharma R, Nainys J, et al. Recovering Gene Interactions from Single-Cell Data Using Data Diffusion. <em>Cell</em>. 2018 Jul 26;174(3):716-729.e27.</p> <p><strong>作者介绍：</strong></p> <table><thead><tr><th style="text-align:center;">Dana Pe'er</th></tr></thead> <tbody><tr><td style="text-align:center;"><img src="https://www.mskcc.org/sites/default/files/styles/width_300_1x1/public/node/132778/person/peer_3x2.webp" width="200"></td></tr> <tr><td style="text-align:center;">Memorial Sloan Kettering Cancer Center</td></tr> <tr><td style="text-align:center;"><a href="mailto:peerd@mskcc.org">peerd@mskcc.org</a></td></tr></tbody></table> <h2 id="abstract"><a href="#abstract" class="header-anchor">#</a> Abstract</h2> <p>scRNAseq 技术受到许多技术噪音来源的影响，包括 mRNA 分子的采样不足，通常被称为 &quot;dropout&quot;，这可能会严重掩盖重要的基因-基因关系。为了解决这个问题，我们开发了 MAGIC(Markov affinity-based graph imputation of cells)，一种通过数据扩散在相似细胞之间共享信息的方法，对细胞计数矩阵去除噪声并填充缺失的转录本。我们在几个生物系统上验证了 MAGIC，并发现它在恢复基因-基因关系和其他结构方面很有效。应用于上皮到间充质转化，MAGIC 揭示了一个表型连续体，大多数细胞处于中间状态，显示茎状特征，并推断已知和以前未确定特征的调节相互作用，表明我们的方法可以在不受干扰的情况下成功地揭示调节关系。</p> <h2 id="results"><a href="#results" class="header-anchor">#</a> Results</h2> <h3 id="fig1-steps-of-the-magic-algorithm"><a href="#fig1-steps-of-the-magic-algorithm" class="header-anchor">#</a> Fig1. Steps of the MAGIC Algorithm</h3> <p><img src="https://www.cell.com/cms/attachment/b00c9694-c3d7-48e3-813b-c67769346330/gr1_lrg.jpg" alt="Fig1"></p> <div class="custom-block note"><p class="custom-block-title">Fig1. MAGIC 算法的各个步骤</p> <p><strong>i.</strong> MAGIC 的输入数据为一个细胞-基因矩阵。<br> <strong>ii.</strong> 利用输入计算一个细胞距离矩阵(distance matrix)。<br> <strong>iii.</strong> 利用 Gaussian kernel 将距离矩阵转换为亲和矩阵(affinity matrix)。<br> <strong>iv.</strong> 将亲和矩阵归一化，得到马尔可夫矩阵(Markov matrix)。马尔科夫矩阵显示为一个单点向其他点的跃迁概率。<br> <strong>v.</strong> 为了进行 diffusion，将马尔科夫矩阵取幂到选定的 t 次幂；<br> <strong>vi.</strong> 将取幂的马尔科夫矩阵与原始数据矩阵相乘，得到 denoised and imputed 数据矩阵。</p></div> <h3 id="fig2-magic-applied-to-mouse-myeloid-progenitor-data"><a href="#fig2-magic-applied-to-mouse-myeloid-progenitor-data" class="header-anchor">#</a> Fig2. MAGIC Applied to Mouse Myeloid Progenitor Data</h3> <p><img src="https://www.cell.com/cms/attachment/e226d529-7822-4809-90fd-4e8683327c1c/gr2_lrg.jpg" alt="Fig2"></p> <div class="custom-block note"><p class="custom-block-title">Fig2. MAGIC 应用于小鼠骨髓祖细胞数据</p></div> <h3 id="fig3-magic-preserves-cluster-structure"><a href="#fig3-magic-preserves-cluster-structure" class="header-anchor">#</a> Fig3. MAGIC Preserves Cluster Structure</h3> <p><img src="https://www.cell.com/cms/attachment/9083baf8-1071-4201-b6e6-c4183e9d8703/gr3_lrg.jpg" alt="Fig3"></p> <div class="custom-block note"><p class="custom-block-title">Fig3. MAGIC 保留类群结构</p></div> <h3 id="fig4-magic-recovers-a-state-space-in-emt-data"><a href="#fig4-magic-recovers-a-state-space-in-emt-data" class="header-anchor">#</a> Fig4. MAGIC Recovers a State Space in EMT Data</h3> <p><img src="https://www.cell.com/cms/attachment/5ec8c3bb-8a86-4507-b32d-30a6cc784864/gr4_lrg.jpg" alt="Fig4"></p> <div class="custom-block note"><p class="custom-block-title">Fig4. MAGIC 恢复 EMT 数据中的状态空间</p></div> <h3 id="fig5-gene-gene-relationships-and-knn-dremi"><a href="#fig5-gene-gene-relationships-and-knn-dremi" class="header-anchor">#</a> Fig5. Gene-Gene Relationships and kNN-DREMI</h3> <p><img src="https://www.cell.com/cms/attachment/f1725711-79b1-4ad2-82b2-63b751c07289/gr5_lrg.jpg" alt="Fig5"></p> <div class="custom-block note"><p class="custom-block-title">Fig5. 基因-基因关系和 kNN-DREMI</p></div> <h3 id="fig6-gene-expression-dynamics-underlying-emt-and-tf-target-predictions"><a href="#fig6-gene-expression-dynamics-underlying-emt-and-tf-target-predictions" class="header-anchor">#</a> Fig6. Gene Expression Dynamics Underlying EMT and TF Target Predictions</h3> <p><img src="https://www.cell.com/cms/attachment/82fd4a87-b21f-42d6-9353-a962f1407acb/gr6_lrg.jpg" alt="Fig6"></p> <div class="custom-block note"><p class="custom-block-title">Fig6. EMT 和 TF 目标预测的基因表达动力学</p></div> <h3 id="fig7-comparison-of-magic-to-other-imputation-and-smoothing-methods"><a href="#fig7-comparison-of-magic-to-other-imputation-and-smoothing-methods" class="header-anchor">#</a> Fig7. Comparison of MAGIC to Other Imputation and Smoothing Methods</h3> <p><img src="https://www.cell.com/cms/attachment/9964acd2-48dc-4bd1-9d74-3aa9fd558560/gr7_lrg.jpg" alt="Fig7"></p> <div class="custom-block note"><p class="custom-block-title">Fig7. MAGIC 与其他 imputation 和 smoothing 方法的比较</p></div></div></div>  <div class="page-edit"><!----> <div class="tags"><a href="/tags/?tag=%E7%94%9F%E7%89%A9%E4%BF%A1%E6%81%AF%E5%AD%A6" title="标签">#生物信息学</a></div> <div class="last-updated"><span class="prefix">更新时间:</span> <span class="time">2023/06/16, 10:28:34</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/f37280/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">文献阅读 --- Integrating single-cell transcriptomic data across different conditions, technologies, and species</div></a> <a href="/pages/71b694/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">文献阅读 --- DoubletFinder:Doublet Detection in Single-Cell RNA Sequencing Data Using Artificial Nearest Neighbors</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
