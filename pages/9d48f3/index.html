Doc: <a href="https://www.bioconductor.org/packages/release/bioc/html/MetaNeighbor.html" target="_blank" rel="noopener noreferrer">https://www.bioconductor.org/packages/release/bioc/html/MetaNeighbor.html<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a></p> <p><strong>作者介绍</strong></p> <table><thead><tr><th style="text-align:center;">Jesse Gillis</th></tr></thead> <tbody><tr><td style="text-align:center;"><img src="https://thedonnellycentre.utoronto.ca/sites/default/files/styles/square_1_1_900/public/assets/faculty/image/Jesse-Gillis-2L6A0146_1.webp?itok=X5ZW7Cwo" width="200"></td></tr> <tr><td style="text-align:center;">Cold Spring Harbor Laboratory</td></tr> <tr><td style="text-align:center;"><a href="mailto:jgillis@cshl.edu">jgillis@cshl.edu</a></td></tr></tbody></table> <h2 id="_1-introduction"><a href="#_1-introduction" class="header-anchor">#</a> 1 Introduction</h2> <p>该方法的目的是通过从随机和功能定义的基因组中采样来测量跨<code>单细胞 RNA 测序 (scRNA-seq)</code>数据集的<code>细胞相似性</code>。MetaNeighbor 的工作基于相同类型的细胞应该比不同类型的细胞具有更相似的基因表达谱。换句话说，当我们比较给定基因组的 T 细胞和肝细胞之间的表达谱时，我们应该看到所有 T 细胞之间的相关性高于 T 细胞和肝细胞之间的相关性。这在下面的示意图中进行了说明：</p> <p><img src="https://media.springernature.com/full/springer-static/image/art%3A10.1038%2Fs41467-018-03282-0/MediaObjects/41467_2018_3282_Fig1_HTML.jpg?as=webp" alt="Figure 1"></p> <div class="custom-block note"><p class="custom-block-title">Figure 1</p> <p><strong>A.</strong> 基因集表达与细胞类型之间的关系 <br> <strong>B.</strong> 细胞类型内和细胞类型之间的细胞相似性</p></div> <p>在 MetaNeighbor 中，这是通过基于细胞-细胞相似性的邻居投票来格式化的，这将在“Methods”部分中详细描述。简而言之，<strong>MetaNeighbor 接受四个输入：1.</strong> a gene-by-sample expression matrix (&quot;data&quot;)，<strong>2.</strong> a set of labels indicating each sample’s dataset of origin (&quot;experiment labels&quot;)，<strong>3.</strong> a set of labels indicating each sample's cell type (&quot;cell type labels&quot;)，<strong>4.</strong> a set of genes (&quot;gene sets&quot;)。输出是一个性能向量（&quot;<code>AUROC scores</code>&quot;），它是给定任务的接收者操作特征曲线（AUROC）下的平均面积。这一得分反映了我们在数据集中将相同已知类型的细胞排名高于其他类型的能力，并且可以解释为我们对给定细胞进行二元分类正确的概率 (e.g. neuron vs. non-neuronal cell)。AUROC 得分为 0.5 意味着我们的表现与我们随机猜测细胞的身份一样。这是一个完全监督的分析，并且需要跨数据集的相应细胞类型的知识。然而，当标签可能不明确或无信息时，我们还使用了一些启发式措施来识别数据集中的细胞类型。我们将在小插图的 Part 2 部分中完成这个探索性分析。</p> <h2 id="_2-data-type-requirements"><a href="#_2-data-type-requirements" class="header-anchor">#</a> 2 Data type requirements</h2> <p>要运行 MetaNeighbor，输入数据应该是 <code>SummarizedExperiment objec (SEO)</code>，并考虑以下因素：</p> <ol><li>The gene-by-sample matrix should be an assay of SEO.</li> <li>Gene sets of interest should be provided as a list of vectors.</li> <li>Additional data should have following vectors:</li></ol> <ul><li><strong>sample_id</strong>: A character vector (length equal to the number of samples) containing a unique identifier for each sample.</li> <li><strong>study_id</strong>: A character vector (length equal to the number of samples) that indicates the source of each sample (ex.“GSE60361” = Zeisel et al, “GSE71585” = Tasic et al, as in mn_data).</li> <li><strong>cell_type</strong>: A character vector (length equal to the number of samples) that indicates the celltype of each sample.</li></ul> <ol start="4"><li><strong>cell_labels</strong> should be provided as a sample-by-cell label matrix. This should be a binary (0,1) matrix where 1 indicates cell type membership and 0 indicates non-membership.</li></ol> <p>需要注意的附加要求:</p> <ol><li>It is critical that genes within gene sets match the gene names of the expression matrix.</li> <li>Gene sets should contain more than one gene.</li> <li>The row names of the cell_labels object should match the column names of the expression matrix.</li></ol> <h2 id="_3-system-requirements-estimated-run-times"><a href="#_3-system-requirements-estimated-run-times" class="header-anchor">#</a> 3 System requirements/estimated run times</h2> <p>Laptop (OSX 10.10.4, 1.6 GHz, 8GB RAM, R 3.3.2, Rstudio 0.99.446) for the default version.</p> <p>Desktop (Ubuntu 18.04.1 in an Oracle VM, 4 x 3.6 GHz, 10.9GB RAM, R 3.4.4) for the low-memory version.</p> <h2 id="_4-installation"><a href="#_4-installation" class="header-anchor">#</a> 4 Installation</h2> <p>通过运行以下命令安装 MetaNeighbor 软件包：</p> <div class="language-r line-numbers-mode"><pre class="language-r"><code><span class="token keyword">if</span> <span class="token punctuation">(</span><span class="token operator">!</span>require<span class="token punctuation">(</span><span class="token string">'devtools'</span><span class="token punctuation">)</span><span class="token punctuation">)</span> <span class="token punctuation">{</span>
  install.packages<span class="token punctuation">(</span><span class="token string">'devtools'</span><span class="token punctuation">,</span> quiet<span class="token operator">=</span><span class="token boolean">TRUE</span><span class="token punctuation">)</span>
<span class="token punctuation">}</span>
devtools<span class="token operator">::</span>install_git<span class="token punctuation">(</span><span class="token string">'https://github.com/gillislab/MetaNeighbor'</span><span class="token punctuation">)</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br></div></div><h2 id="_5-methods"><a href="#_5-methods" class="header-anchor">#</a> 5 Methods</h2> <p>MetaNeighbor 运行如下：首先，我们为一个基因集在所有细胞之间建立一个等级相关网络。然后，网络中的所有值都被重新排序和标准化，使其介于 0-1 之间。接下来，邻居投票预测器通过在网络和指示细胞类型成员资格的二进制向量之间执行矩阵乘法来生成预测标签的加权矩阵，然后将每个元素除以空预测器。也就是说，每个细胞的分数等于其邻居（包括其自身）的分数，这些邻居是给定细胞类型的一部分。对于交叉验证，我们通过保留一个数据集的交叉验证的所有可能组合进行置换，并且我们报告我们在接收器操作符特征曲线下恢复与区域相同类型的细胞的能力 (AUROC)。对交叉验证的所有折叠重复，并报告折叠的平均 AUROC。</p> <h3 id="_5-1-part-1-supervised-metaneighbor"><a href="#_5-1-part-1-supervised-metaneighbor" class="header-anchor">#</a> 5.1 Part 1: Supervised MetaNeighbor</h3> <ul><li>官网教程：<a href="https://www.bioconductor.org/packages/release/bioc/vignettes/MetaNeighbor/inst/doc/MetaNeighbor.pdf" target="_blank" rel="noopener noreferrer">https://www.bioconductor.org/packages/release/bioc/vignettes/MetaNeighbor/inst/doc/MetaNeighbor.pdf<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a></li></ul></div></div>  <div class="page-edit"><!----> <div class="tags"><a href="/tags/?tag=%E7%94%9F%E4%BF%A1%E5%B7%A5%E5%85%B7" title="标签">#生信工具</a></div> <div class="last-updated"><span class="prefix">更新时间:</span> <span class="time">2023/05/17, 17:05:53</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/7d0fcf/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">anndata：a Python
