Cite: Kruse K, Hug CB, Vaquerizas JM. FAN-C: a feature-rich framework for the analysis and visualisation of chromosome conformation capture data. <em>Genome Biol</em>. 2020 Dec 17;21(1):303.</p> <p><strong>作者介绍：</strong></p> <table><thead><tr><th style="text-align:center;">Juanma Vaquerizas</th></tr></thead> <tbody><tr><td style="text-align:center;"><img src="https://www.vaquerizaslab.org/wp-content/uploads/2014/06/Juanma-Vaquerizas-web-1-241x300.png" width="200"></td></tr> <tr><td style="text-align:center;">Universidad Autónoma de Madrid</td></tr> <tr><td style="text-align:center;"><a href="mailto:j.vaquerizas@lms.mrc.ac.uk">j.vaquerizas@lms.mrc.ac.uk</a></td></tr></tbody></table> <h2 id="abstract"><a href="#abstract" class="header-anchor">#</a> Abstract</h2> <p>染色体构象捕获数据，特别是来自高通量的方法，如 Hi-C，通常是非常复杂的分析。现有的分析工具通常是单一用途的，或者限制了与少量数据格式的兼容性，这经常使得 Hi-C 分析显得繁琐和耗时。在这里，我们展示了 FAN-C，这是一个易于使用的命令行工具和强大的 Python API，它具有广泛的特性集，包括对 C-like 的数据的矩阵生成、分析和可视化 (<a href="https://github.com/vaquerizaslab/fanc" target="_blank" rel="noopener noreferrer">https://github.com/vaquerizaslab/fanc<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a>)。由于它与最流行的 Hi-C 存储格式兼容，FAN-C 可以与大量现有的分析工具结合使用，从而大大简化了 Hi-C 矩阵分析。</p> <h2 id="results"><a href="#results" class="header-anchor">#</a> Results</h2> <h3 id="fig1-overview-of-fan-c-functionality"><a href="#fig1-overview-of-fan-c-functionality" class="header-anchor">#</a> Fig1. Overview of FAN-C functionality</h3> <p><img src="https://media.springernature.com/full/springer-static/image/art%3A10.1186%2Fs13059-020-02215-9/MediaObjects/13059_2020_2215_Fig1_HTML.png?as=webp" alt="Fig1"></p> <div class="custom-block note"><p class="custom-block-title">Fig1. FAN-C 功能概述</p> <p><strong>A.</strong> Hi-C 从实验到数据分析的概述，RE: restriction enzyme。<br> <strong>B.</strong> Matrix generation features。<br> <strong>C.</strong> Hi-C matrix analysis features。<br> <strong>D.</strong> Hi-C visualisation features。<br> <strong>E.</strong> Helper tools。</p></div> <h3 id="fig2-fan-c-matrix-generation"><a href="#fig2-fan-c-matrix-generation" class="header-anchor">#</a> Fig2. FAN-C matrix generation</h3> <p><img src="https://media.springernature.com/full/springer-static/image/art%3A10.1186%2Fs13059-020-02215-9/MediaObjects/13059_2020_2215_Fig2_HTML.png?as=webp" alt="Fig2"></p> <div class="custom-block note"><p class="custom-block-title">Fig2. FAN-C matrix generation</p> <p><strong>a-c.</strong> matrix generation pipeline 的示意图概述。比对(a)， Hi-C read pairs 的处理和过滤(b)，从有效的 read pairs 中对 Hi-C矩阵进行组装、过滤和归一化。<br> <strong>d–f.</strong> FAN-C 统计图使用了来自 HUVEC Hi-C 的数据。d. 连接误差图，虚线表示期望值。e. 从一个 read 的比对位置到最近的限制性位点所测量的限制性位点距离（insert size）之和的密度图，虚线表示插入大小的中位数。f. 摘要统计图显示了被各种过滤器删除的 read pairs。<br> <strong>g.</strong> 在 1 kb binned 分辨率下 Hi-C 矩阵的覆盖图。虚线表示在 25% 中位数覆盖率时选择的 coverage cutoff。</p></div> <h3 id="fig3-fan-c-analysis-features"><a href="#fig3-fan-c-analysis-features" class="header-anchor">#</a> Fig3. FAN-C analysis features</h3> <p><img src="https://media.springernature.com/full/springer-static/image/art%3A10.1186%2Fs13059-020-02215-9/MediaObjects/13059_2020_2215_Fig3_HTML.png?as=webp" alt="Fig3"></p> <div class="custom-block note"><p class="custom-block-title">Fig3. FAN-C analysis features</p></div> <h3 id="fig4-fan-c-comparison-workflow-for-neuronal-differentiation"><a href="#fig4-fan-c-comparison-workflow-for-neuronal-differentiation" class="header-anchor">#</a> Fig4. FAN-C comparison workflow for neuronal differentiation</h3> <p><img src="https://media.springernature.com/full/springer-static/image/art%3A10.1186%2Fs13059-020-02215-9/MediaObjects/13059_2020_2215_Fig4_HTML.png?as=webp" alt="Fig4"></p> <div class="custom-block note"><p class="custom-block-title">Fig4. 神经元分化的 FAN-C 比较工作流程。</p></div></div></div>  <div class="page-edit"><!----> <div class="tags"><a href="/tags/?tag=%E7%94%9F%E7%89%A9%E4%BF%A1%E6%81%AF%E5%AD%A6" title="标签">#生物信息学</a></div> <div class="last-updated"><span class="prefix">更新时间:</span> <span class="time">2023/06/16, 10:28:34</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/1f3ea0/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">文献阅读 --- Cellpose：a generalist algorithm for cellular segmentation</div></a> <a href="/pages/1c1b2b/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">文献阅读 --- Toward data-efficient learning：A benchmark for COVID-19 CT lung and infection segmentation</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
