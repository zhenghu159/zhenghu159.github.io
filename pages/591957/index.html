DOI: <a href="https://doi.org/10.1038/s41586-019-0969-x" target="_blank" rel="noopener noreferrer">https://doi.org/10.1038/s41586-019-0969-x<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a><br>
Cite: Cao, J., Spielmann, M., Qiu, X. et al. The single-cell transcriptional landscape of mammalian organogenesis. <em>Nature</em> 566, 496–502 (2019).</p> <p><strong>作者介绍：</strong></p> <table><thead><tr><th style="text-align:center;">Jay Shendure</th> <th style="text-align:center;">Cole Trapnell</th></tr></thead> <tbody><tr><td style="text-align:center;"><img src="https://iscrm2.wpenginepowered.com/wp-content/uploads/2021/10/shendure.jpeg" width="200"></td> <td style="text-align:center;"><img src="https://www.gs.washington.edu/faculty/images/trapnell2.jpg" width="200"></td></tr> <tr><td style="text-align:center;">University of Washington</td> <td style="text-align:center;">University of Washington</td></tr> <tr><td style="text-align:center;"><a href="mailto:shendure@uw.edu">shendure@uw.edu</a></td> <td style="text-align:center;"><a href="mailto:coletrap@uw.edu">coletrap@uw.edu</a></td></tr></tbody></table> <h2 id="abstract"><a href="#abstract" class="header-anchor">#</a> Abstract</h2> <p>哺乳动物的器官发生是一个显著的过程。在很短的时间内，三个胚层的细胞转化为一个胚胎，其中包括大部分主要的内外器官。在这里，我们研究了在单细胞分辨率下的小鼠器官发生的转录动态。使用单细胞组合索引，我们在一个单一实验中分析了来自 61 个妊娠 9.5-13.5 天的胚胎的约 200 万个细胞的转录组。由此产生的“小鼠器官发生细胞图谱（mouse organogenesis cell atlas，MOCA）”提供了在这个关键窗口的发育过程的全局视图。我们使用 Monocle3 识别了数百种细胞类型和 56 种轨迹（trajectories），其中许多只是因为细胞覆盖的深度而被检测到，并共同定义了数千个相应的标记基因。我们探索了细胞类型和细胞轨迹中的基因表达随时间的动态变化，包括对顶端外胚层脊、肢体间充质和骨骼肌的重点分析。</p> <h2 id="results"><a href="#results" class="header-anchor">#</a> Results</h2> <h3 id="fig1-sci-rna-seq3-enables-profiling-of-2-072-011-cells-from-61-mouse-embryos-across-5-developmental-stages-in-a-single-experiment"><a href="#fig1-sci-rna-seq3-enables-profiling-of-2-072-011-cells-from-61-mouse-embryos-across-5-developmental-stages-in-a-single-experiment" class="header-anchor">#</a> Fig1. sci-RNA-seq3 enables profiling of 2,072,011 cells from 61 mouse embryos across 5 developmental stages in a single experiment</h3> <p><img src="https://media.springernature.com/full/springer-static/image/art%3A10.1038%2Fs41586-019-0969-x/MediaObjects/41586_2019_969_Fig1_HTML.png?as=webp" alt="Fig1"></p> <div class="custom-block note"><p class="custom-block-title">Fig1. sci-RNA-seq3 可以在一次实验中分析来自 5 个发育阶段的 61 个小鼠胚胎的 2,072,011 个细胞</p> <p><strong>a.</strong> sci-RNA-seq3 的工作流程和实验方案。USER，尿嘧啶特异性切除试剂。<br> <strong>b.</strong> 条形图显示了 61 个小鼠胚胎的细胞数量。<br> <strong>c.</strong> 小鼠胚胎 pseudobulk RNAseq profiles 的拟时序轨迹。</p></div> <h3 id="fig2-identifying-the-major-cell-types-of-mouse-organogenesis"><a href="#fig2-identifying-the-major-cell-types-of-mouse-organogenesis" class="header-anchor">#</a> Fig2. Identifying the major cell types of mouse organogenesis</h3> <p><img src="https://media.springernature.com/full/springer-static/image/art%3A10.1038%2Fs41586-019-0969-x/MediaObjects/41586_2019_969_Fig2_HTML.png?as=webp" alt="Fig2"></p> <div class="custom-block note"><p class="custom-block-title">Fig2. 确定小鼠器官发生的主要细胞类型</p> <p><strong>a.</strong> 2,026,641 个小鼠胚胎细胞的 t-SNE 可视化（去除一个假定的双细胞类）。下面展示了每个阶段的 t-SNE。方框圈出来的是原始的红细胞（ Primitive erythroid）和最终的红细胞（definitive erythroid）。<br> <strong>b.</strong> 点图显示每个细胞类型的一个选定标记基因的表达。</p></div> <h3 id="fig3-identification-and-characterization-of-epithelial-cell-subtypes-and-the-limb-aer"><a href="#fig3-identification-and-characterization-of-epithelial-cell-subtypes-and-the-limb-aer" class="header-anchor">#</a> Fig3. Identification and characterization of epithelial cell subtypes and the limb AER</h3> <p><img src="https://media.springernature.com/full/springer-static/image/art%3A10.1038%2Fs41586-019-0969-x/MediaObjects/41586_2019_969_Fig3_HTML.png?as=webp" alt="Fig3"></p> <div class="custom-block note"><p class="custom-block-title">Fig3. 上皮细胞亚型和 limb AER 的鉴定和表征</p> <p><strong>a.</strong> t-SNE 可视化和基于标记的上皮细胞亚型注释（74,651个细胞）。<br> <strong>b.</strong> Fgf8 高表达的所有上皮细胞的 t-SNE 可视化。<br> <strong>c.</strong> E9.5~E13.5 胚胎中 Fgf8 的原位杂交图像。<br> <strong>d.</strong> Fndc3a, Adamts3, Snap91 高表达的所有上皮细胞的 t-SNE 可视化。<br> <strong>e.</strong> Fndc3a, Adamts3, Snap91 的原位杂交图像。<br> <strong>f.</strong> Epithelial cells 和 AER 细胞的相对细胞数随拟时序的变化。<br> <strong>g.</strong> AER 单细胞转录组（细胞数量，n = 1,237）的拟时序轨迹，按发育阶段着色。<br> <strong>h.</strong> AER marker genes 随拟时序的相对表达变化。</p></div> <h3 id="fig4-characterization-of-ten-major-developmental-trajectories-present-during-mouse-organogenesis"><a href="#fig4-characterization-of-ten-major-developmental-trajectories-present-during-mouse-organogenesis" class="header-anchor">#</a> Fig4. Characterization of ten major developmental trajectories present during mouse organogenesis</h3> <p><img src="https://media.springernature.com/full/springer-static/image/art%3A10.1038%2Fs41586-019-0969-x/MediaObjects/41586_2019_969_Fig4_HTML.png?as=webp" alt="Fig4"></p> <div class="custom-block note"><p class="custom-block-title">Fig4. 小鼠器官发生过程中10个主要发育轨迹的特征</p> <p><strong>a.</strong> 数据集的 UMAP 3D 可视化。<br> <strong>b.</strong> 10个主要轨迹在38个主要细胞类型中的细胞比例。<br> <strong>c.</strong> 根据发育阶段着色的上皮细胞亚轨迹的UMAP三维可视化。</p></div> <h3 id="fig5-umap-visualization-of-individual-major-trajectories"><a href="#fig5-umap-visualization-of-individual-major-trajectories" class="header-anchor">#</a> Fig5. UMAP visualization of individual major trajectories</h3> <p><img src="https://media.springernature.com/full/springer-static/image/art%3A10.1038%2Fs41586-019-0969-x/MediaObjects/41586_2019_969_Fig5_HTML.png?as=webp" alt="Fig5"></p> <div class="custom-block note"><p class="custom-block-title">Fig5. 单个主要轨迹的 UMAP 可视化</p></div> <h3 id="fig5-resolving-cellular-trajectories-in-myogenesis"><a href="#fig5-resolving-cellular-trajectories-in-myogenesis" class="header-anchor">#</a> Fig5. Resolving cellular trajectories in myogenesis</h3> <p><img src="https://media.springernature.com/full/springer-static/image/art%3A10.1038%2Fs41586-019-0969-x/MediaObjects/41586_2019_969_Fig6_HTML.png?as=webp" alt="Fig6"></p> <div class="custom-block note"><p class="custom-block-title">Fig6. 骨骼肌细胞发生过程中的细胞轨迹</p></div></div></div>  <div class="page-edit"><!----> <div class="tags"><a href="/tags/?tag=%E5%8D%95%E7%BB%86%E8%83%9E%E7%A9%BA%E9%97%B4%E7%BB%84" title="标签">#单细胞空间组</a></div> <div class="last-updated"><span class="prefix">更新时间:</span> <span class="time">2023/06/16, 10:28:34</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/895303/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">文献阅读 --- A high-resolution transcriptomic and spatial atlas of cell types in the whole mouse brain</div></a> <a href="/pages/3eedee/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">文献阅读 --- Single‐cell transcriptomic analysis reveals circadianrhythm disruption associated with poor prognosisand drug‐resistance in lung adenocarcinoma</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
